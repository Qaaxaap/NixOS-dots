proxy-groups:
  # 自动选择组（延迟最低）
  - name: "🚀 自动选择"
    type: url-test
    proxies:
      - "🇯🇵 日本 x 1.0"
      - "🇸🇬 新加坡 x 1.0"
      - "🇺🇸 美国 x 1.0"
      - "🇭🇰 香港 x 1.0"
      - "🇰🇷 韩国 x 0.9"
      - "🇦🇺 澳大利亚 x 0.8"
      - "🇮🇳 印度 x 0.8"
      - "🇬🇧 英国 x 0.8"
      - "🇨🇦 加拿大 x 0.8"
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  # 手动选择组
  - name: "🌍 手动选择"
    type: select
    proxies:
      - "🚀 自动选择"
      - "🇯🇵 日本 x 1.0"
      - "🇸🇬 新加坡 x 1.0"
      - "🇺🇸 美国 x 1.0"
      - "🇭🇰 香港 x 1.0"
      - "🇰🇷 韩国 x 0.9"
      - "🇦🇺 澳大利亚 x 0.8"
      - "🇮🇳 印度 x 0.8"
      - "🇬🇧 英国 x 0.8"
      - "🇨🇦 加拿大 x 0.8"
      - DIRECT

  # 国外网站组
  - name: "🌐 国外网站"
    type: select
    proxies:
      - "🚀 自动选择"
      - "🌍 手动选择"
      - DIRECT

rules:
  # 国内直连
  - DOMAIN-SUFFIX,cn,DIRECT
  - DOMAIN-SUFFIX,edu.cn,DIRECT
  - DOMAIN-SUFFIX,com.cn,DIRECT
  - DOMAIN-SUFFIX,gov.cn,DIRECT
  - DOMAIN-SUFFIX,mil.cn,DIRECT
  - DOMAIN-SUFFIX,net.cn,DIRECT
  - DOMAIN-SUFFIX,org.cn,DIRECT
  - DOMAIN-SUFFIX,qq.com,DIRECT
  - DOMAIN-SUFFIX,baidu.com,DIRECT
  - DOMAIN-SUFFIX,taobao.com,DIRECT
  - DOMAIN-SUFFIX,jd.com,DIRECT
  - DOMAIN-SUFFIX,weibo.com,DIRECT
  - DOMAIN-SUFFIX,163.com,DIRECT
  - DOMAIN-SUFFIX,126.com,DIRECT
  - DOMAIN-SUFFIX,alicdn.com,DIRECT
  
  # 本地网络直连
  - IP-CIDR,127.0.0.0/8,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,224.0.0.0/4,DIRECT
  - IP-CIDR,100.64.0.0/10,DIRECT
  
  # 国外网站走代理
  - DOMAIN-SUFFIX,google.com,🌐 国外网站
  - DOMAIN-SUFFIX,gstatic.com,🌐 国外网站
  - DOMAIN-SUFFIX,github.com,🌐 国外网站
  - DOMAIN-SUFFIX,githubusercontent.com,🌐 国外网站
  - DOMAIN-SUFFIX,youtube.com,🌐 国外网站
  - DOMAIN-SUFFIX,twitter.com,🌐 国外网站
  - DOMAIN-SUFFIX,facebook.com,🌐 国外网站
  - DOMAIN-SUFFIX,instagram.com,🌐 国外网站
  - DOMAIN-SUFFIX,reddit.com,🌐 国外网站
  - DOMAIN-SUFFIX,wikipedia.org,🌐 国外网站
  - DOMAIN-SUFFIX,archlinux.org,🌐 国外网站
  - DOMAIN-SUFFIX,aur.archlinux.org,🌐 国外网站
  
  # 最终规则 - 默认走自动选择
  - MATCH,🚀 自动选择
