port: 7890
socks-port: 7891
redir-port: 7892

tun:
  enable: false
  stack: system # 或 gvisor，大多数情况 system 即可
  device: tun0
  dns-hijack:
    - 0.0.0.0:53
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

allow-lan: false
mode: Rule
log-level: info
external-controller: 127.0.0.1:9090
secret: ""  # 控制面板密码，留空为无密码

dns:
  enable: true
  listen: 0.0.0.0:1053
  default-nameserver:
    - 233.5.5.5
    - 114.114.114.114
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - https://doh.pub/dns-query
    - tls://dns.rubyfish.cn:853
    - 8.8.8.8
    - 1.1.1.1
  fallback:
    - tls://8.8.8.8:853
    - tls://1.1.1.1:853
  fallback-filter:
    geoip: true
    ipcidr:
      - 240.0.0.0/4

